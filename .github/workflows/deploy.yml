name: Deploy to Hostinger

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build project
        run: npx vite build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
      
      - name: Deploy via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Install lftp
          sudo apt-get update && sudo apt-get install -y lftp
          
          # Create lftp config
          mkdir -p ~/.lftp
          echo "set ftp:ssl-allow no" > ~/.lftp/rc
          echo "set ftp:passive-mode on" >> ~/.lftp/rc
          echo "set net:timeout 60" >> ~/.lftp/rc
          echo "set net:max-retries 5" >> ~/.lftp/rc
          
          # Run lftp
          lftp -u "$FTP_USER,$FTP_PASS" "$FTP_SERVER" -e "
            mkdir -fp /public_html/assets
            mirror -R --parallel 4 --delete ./dist/ /public_html/ --exclude .htaccess --exclude .well-known/
            bye
          "
        timeout-minutes: 10