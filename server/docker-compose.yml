services:
  qr-gen-server:
    build: .
    container_name: qr-gen-server
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=https://qrgen.studio
      - PORT=3001
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.qr-gen.rule=Host(`api.qrgen.studio`)"
      - "traefik.http.routers.qr-gen.tls=true"
      - "traefik.http.routers.qr-gen.entrypoints=web,websecure"
      - "traefik.http.routers.qr-gen.tls.certresolver=mytlschallenge"
      - "traefik.http.services.qr-gen.loadbalancer.server.port=3001"
    networks:
      - root_default

networks:
  root_default:
    external: true